<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM Browser Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }


        /* Navigation Menu Controls */
        .navbar {
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: #1f2833;
            border-bottom: 1px solid #45a29e;
            padding: 10px 0;
            gap: 20px;
        }


        .tab {
            padding: 8px 16px;
            cursor: pointer;
            color: #66fcf1;
            font-weight: bold;
            opacity: 0.5;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }


        .tab.active {
            opacity: 1;
            border-bottom: 3px solid #66fcf1;
        }


        /* Portal Homepage Setup */
        .search-homepage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 130px;
            width: 90%;
            max-width: 600px;
        }


        .logo {
            font-size: 64px;
            font-weight: 800;
            color: #66fcf1;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(102, 252, 241, 0.3);
        }


        .tagline {
            color: #45a29e;
            margin-bottom: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }


        .search-box {
            width: 100%;
            display: flex;
            background-color: #1f2833;
            border: 2px solid #45a29e;
            border-radius: 30px;
            padding: 5px 20px;
            box-sizing: border-box;
        }


        .search-box input {
            width: 100%;
            background: none;
            border: none;
            padding: 12px;
            font-size: 16px;
            color: white;
            outline: none;
        }


        .search-btn {
            background-color: #66fcf1;
            color: #0b0c10;
            border: none;
            padding: 12px 32px;
            margin-top: 25px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }


        .search-btn:hover {
            background-color: #45a29e;
            color: white;
            transform: scale(1.02);
        }


        /* Results Display Area */
        .results-container {
            width: 90%;
            max-width: 900px;
            margin-top: 30px;
            display: none;
            padding-bottom: 50px;
        }


        /* Text Layout Styling */
        .web-result {
            background-color: #1f2833;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2f3b4c;
        }


        .web-result h3 {
            margin: 0 0 5px 0;
            color: #66fcf1;
        }


        .web-result a {
            color: #45a29e;
            text-decoration: none;
            font-size: 13px;
            display: block;
            margin-bottom: 10px;
        }


        .web-result p {
            margin: 0;
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.6;
        }


        /* Image Display System */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
            width: 100%;
        }


        .image-card {
            background-color: #1f2833;
            border: 1px solid #2f3b4c;
            border-radius: 12px;
            overflow: hidden;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }


        /* Vector Graphic Canvas */
        .image-card canvas {
            width: 100%;
            height: 190px;
            border-radius: 8px;
            background-color: #0b0c10;
        }


        .image-card p {
            margin: 12px 0 2px 0;
            font-size: 14px;
            font-weight: bold;
            color: #66fcf1;
            text-align: center;
            text-transform: capitalize;
        }


        .status-msg {
            text-align: center;
            font-size: 18px;
            color: #45a29e;
            margin-top: 40px;
        }
    </style>
</head>
<body>


    <div class="navbar">
        <div id="webTab" class="tab active" onclick="switchTab('web')">Websites</div>
        <div id="imageTab" class="tab" onclick="switchTab('images')">Images</div>
    </div>


    <div class="search-homepage" id="homepage">
        <div class="logo">QUANTUM</div>
        <div class="tagline">The Infinite Data Core</div>
        <div class="search-box">
            <input type="text" id="searchQuery" placeholder="Search the universal core..." onkeypress="checkEnter(event)">
        </div>
        <button class="search-btn" onclick="performSearch()">Search</button>
    </div>


    <div class="results-container" id="resultsView">
        <button class="search-btn" style="margin: 0 0 20px 0; padding: 6px 18px;" onclick="returnHome()">← Back</button>
        <div id="outputArea"></div>
    </div>


    <script>
        let currentTab = 'web';


        function switchTab(type) {
            currentTab = type;
            document.getElementById('webTab').classList.remove('active');
            document.getElementById('imageTab').classList.remove('active');
            document.getElementById(type + 'Tab').classList.add('active');
            
            if (document.getElementById('searchQuery').value.trim()) {
                performSearch();
            }
        }


        function checkEnter(e) {
            if (e.key === 'Enter') performSearch();
        }


        function returnHome() {
            document.getElementById('searchQuery').value = '';
            document.getElementById('resultsView').style.display = 'none';
            document.getElementById('homepage').style.display = 'flex';
        }


        function performSearch() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) return;


            document.getElementById('homepage').style.display = 'none';
            document.getElementById('resultsView').style.display = 'block';


            const output = document.getElementById('outputArea');
            output.innerHTML = '<div class="status-msg">Processing parameters...</div>';


            if (currentTab === 'web') {
                fetchWebResults(query, output);
            } else {
                fetchImageResults(query, output);
            }
        }


        // WEBSITE HANDLER (Wikipedia Open Directory)
        async function fetchWebResults(query, output) {
            const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&prop=info&inprop=url&utf8=&format=json&origin=*&srlimit=6&srsearch=${encodeURIComponent(query)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                output.innerHTML = ''; 


                const results = data.query.search;
                if (results.length === 0) {
                    output.innerHTML = `<div class="status-msg">0 records matched "${query}".</div>`;
                    return;
                }


                results.forEach(result => {
                    const pageUrl = `https://en.wikipedia.org/?curid=${result.pageid}`;
                    const cleanSnippet = result.snippet.replace(/<span class="searchmatch">/g, '').replace(/<\/span>/g, '');
                    output.innerHTML += `
                        <div class="web-result">
                            <h3>${result.title}</h3>
                            <a href="#" target="_blank">${pageUrl}</a>
                            <p>${cleanSnippet}...</p>
                        </div>
                    `;
                });
            } catch (err) {
                output.innerHTML = '<div class="status-msg" style="color: #ff5376;">Directory connection restricted by local firewall.</div>';
            }
        }


        // Helper string hashing function to generate persistent colors based on your query text
        function generateHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return Math.abs(hash);
        }


        // NETWORK-INDEPENDENT VECTOR IMAGE GENERATOR
        function fetchImageResults(query, output) {
            output.innerHTML = '';
            const seed = generateHash(query.toLowerCase());
            
            let gridHtml = '<div class="image-grid">';
            for (let i = 1; i <= 4; i++) {
                gridHtml += `
                    <div class="image-card">
                        <canvas id="vectorCanvas_${i}" width="300" height="190"></canvas>
                        <p>${query} Node ${i}</p>
                    </div>
                `;
            }
            gridHtml += '</div>';
            output.innerHTML = gridHtml;


            // Instantly render visual parameters via HTML5 Canvas context engines
            for (let i = 1; i <= 4; i++) {
                const canvas = document.getElementById(`vectorCanvas_${i}`);
                if (!canvas) continue;
                const ctx = canvas.getContext('2d');


                // Determine dynamic color spectra mathematically from your search term text
                const baseHue = (seed + (i * 65)) % 360;
                const secondaryHue = (baseHue + 120) % 360;


                // Create a smooth dark geometric background matrix
                let grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, `hsl(${baseHue}, 65%, 25%)`);
                grad.addColorStop(1, `hsl(${secondaryHue}, 75%, 12%)`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);


                // Overlay high-tech vector interfaces
                ctx.fillStyle = `hsla(${secondaryHue}, 90%, 60%, 0.15)`;
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2, 40 + (i * 10), 0, Math.PI * 2);
                ctx.fill();


                // Draw alignment targeting lines
                ctx.strokeStyle = `hsla(${baseHue}, 80%, 50%, 0.4)`;
                ctx.lineWidth = 2;
                ctx.strokeRect(30, 20, canvas.width - 60, canvas.height - 40);


                // Print the query text directly inside the center framework design
                ctx.fillStyle = '#66fcf1';
                ctx.font = 'bold 16px Segoe UI, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(query.toUpperCase(), canvas.width / 2, canvas.height / 2 + 5);
            }
        }
    </script>
</body>
</html>
