<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }


        /* Top Bar Layout */
        .navbar {
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: #1a1a1e;
            border-bottom: 1px solid #2d2d34;
            padding: 12px 0;
        }


        .search-homepage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 140px;
            width: 90%;
            max-width: 600px;
        }


        .logo {
            font-size: 64px;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 25px;
            letter-spacing: -2px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }


        .search-box {
            width: 100%;
            display: flex;
            background-color: #1e1e24;
            border: 2px solid #334155;
            border-radius: 30px;
            padding: 5px 20px;
            box-sizing: border-box;
        }


        .search-box input {
            width: 100%;
            background: none;
            border: none;
            padding: 12px;
            font-size: 16px;
            color: white;
            outline: none;
        }


        .search-btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            margin-top: 25px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }


        .search-btn:hover {
            background-color: #0ea5e9;
            transform: scale(1.02);
        }


        /* Live Results Layout */
        .results-container {
            width: 90%;
            max-width: 750px;
            margin-top: 30px;
            display: none;
            padding-bottom: 50px;
        }


        .web-result {
            background-color: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }


        .web-result h3 {
            margin: 0 0 5px 0;
            color: #38bdf8;
            font-size: 20px;
        }


        .web-result .link {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 10px;
            word-break: break-all;
        }


        .web-result p {
            margin: 0;
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.6;
        }


        .loading {
            text-align: center;
            font-size: 18px;
            color: #94a3b8;
            margin-top: 40px;
        }
    </style>
</head>
<body>


    <div class="navbar">
        <span style="color: #38bdf8; font-weight: bold; cursor: pointer;" onclick="returnHome()">Quantum Live Engine</span>
    </div>


    <div class="search-homepage" id="homepage">
        <div class="logo">QUANTUM</div>
        <div class="search-box">
            <input type="text" id="searchQuery" placeholder="Search the actual internet..." onkeypress="checkEnter(event)">
        </div>
        <button class="search-btn" onclick="performLiveSearch()">Live Internet Search</button>
    </div>


    <div class="results-container" id="resultsView">
        <button class="search-btn" style="margin: 0 0 20px 0; padding: 6px 18px;" onclick="returnHome()">← New Search</button>
        <div id="outputArea"></div>
    </div>


    <script>
        function checkEnter(e) {
            if (e.key === 'Enter') performLiveSearch();
        }


        function returnHome() {
            document.getElementById('searchQuery').value = '';
            document.getElementById('resultsView').style.display = 'none';
            document.getElementById('homepage').style.display = 'flex';
        }


        // THE LIVE INTERNET CRAWLER / FETCHER
        async function performLiveSearch() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) return;


            // Switch views
            document.getElementById('homepage').style.display = 'none';
            document.getElementById('resultsView').style.display = 'block';
            
            const output = document.getElementById('outputArea');
            output.innerHTML = '<div class="loading">Crawling the web for live data...</div>';


            // We use the open internet Wikipedia API to pull real database records live
            const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&prop=info&inprop=url&utf8=&format=json&origin=*&srlimit=5&srsearch=${encodeURIComponent(query)}`;


            try {
                const response = await fetch(url);
                const data = await response.json();
                
                output.innerHTML = ''; // Clear loading message


                const results = data.query.search;
                
                if (results.length === 0) {
                    output.innerHTML = `<div class="loading">No actual records found for "${query}". Try another topic.</div>`;
                    return;
                }


                // Render each real web result onto your custom interface
                results.forEach(result => {
                    const pageUrl = `https://en.wikipedia.org/?curid=${result.pageid}`;
                    
                    // Clean up snippet formatting tags that come from the database
                    const cleanSnippet = result.snippet.replace(/<span class="searchmatch">/g, '').replace(/<\/span>/g, '');


                    output.innerHTML += `
                        <div class="web-result">
                            <h3>${result.title}</h3>
                            <div class="link">${pageUrl}</div>
                            <p>${cleanSnippet}...</p>
                        </div>
                    `;
                });


            } catch (error) {
                output.innerHTML = '<div class="loading" style="color: #f87171;">Error connecting to live servers. Check your internet connection.</div>';
            }
        }
    </script>
</body>
</html>
